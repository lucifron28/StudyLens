services:
  db:
    image: postgres:16-alpine
    container_name: studylens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-studylens_db}
      POSTGRES_USER: ${DATABASE_USER:-studylens_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-studylens_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-studylens_user} -d ${DATABASE_NAME:-studylens_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: studylens_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,10.0.2.2,*}
      DATABASE_NAME: ${DATABASE_NAME:-studylens_db}
      DATABASE_USER: ${DATABASE_USER:-studylens_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-studylens_password}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
